<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-dark text-white text-center py-3">
          <h4 class="mb-0">User Registration</h4>
        </div>
        <div class="card-body p-4">
          <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label class="form-label fw-bold">Full Name</label>
              <input type="text" formControlName="name" class="form-control" placeholder="John Doe">
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Age</label>
              <input type="number" formControlName="age" class="form-control" placeholder="25">
            </div>

            <div class="mb-3">
              <label class="form-label d-block fw-bold">Gender</label>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" formControlName="gender" value="Male">
                <label class="form-check-label">Male</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" formControlName="gender" value="Female">
                <label class="form-check-label">Female</label>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Country</label>
              <select formControlName="country" class="form-select">
                <option value="" disabled>Select Country</option>
                <option value="India">India</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
              </select>
            </div>

            <button type="submit" [disabled]="userForm.invalid" class="btn btn-primary w-100 py-2 shadow-sm">
              Submit Registration
            </button>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
